description:
  en: 'Foolproof white rice steamed in the Thermomix® simmering basket — the rice cooks above seasoned water for fluffy, separate grains every time. The classic neutral side that pairs with everything from grilled chicken to picadillo to stir-fries.'
  es: 'Arroz blanco al vapor a prueba de errores cocinado en el cestillo de la Thermomix® — el arroz se cuece al vapor sobre agua sazonada para obtener granos esponjosos y sueltos siempre. La guarnición neutra clásica que combina con todo, desde pollo asado hasta picadillo o salteados.'

tips_and_tricks:
  en: 'Rinse the rice well in step 1 — clearer water means fluffier, less starchy grains. The bowl water steams the rice in the basket above; do not let the basket dip into the water before cooking. Do not lift the lid mid-cook — the steam is doing the work. Keeps 4 days in the fridge; reheat with a splash of water in a covered pan over low heat to fluff back up.'
  es: 'Enjuaga bien el arroz en el primer paso — entre más clara salga el agua, más esponjados quedan los granos y menos almidón sueltan. El agua del vaso cuece el arroz al vapor en el cestillo; cuida que el cestillo no toque el agua antes de empezar la cocción. No levantes la tapa a media cocción — el vapor hace el trabajo. Se conserva 4 días en el refrigerador; recalienta con un chorrito de agua en una sartén tapada a fuego bajo para que recupere su esponjosidad.'

scaling_notes:
  en: 'Yields 8 servings as a side. Halves cleanly. Doubling exceeds the simmering basket''s capacity — for more, run two batches. Keeps 4 days in the fridge.'
  es: 'Rinde 8 porciones como guarnición. Se reduce a la mitad sin problema. Duplicar excede la capacidad del cestillo — para más, prepara dos tandas. Se conserva 4 días en el refrigerador.'

