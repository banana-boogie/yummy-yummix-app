# DB description (EN+ES) and EN tips are well-authored — preserved. Only edits:
# (1) drop "one-pot meal" / "una sola olla" claim — recipe uses the Thermomix bowl
# AND a separate frying pan in step 1, so it's not actually one pot. (2) ES tips
# usted voice → tú. (3) author scaling_notes (NULL in DB).
description:
  en: 'A soul-warming Mexican classic — silky tomato-chile broth from the Thermomix®, topped with crispy tortilla strips fried separately, creamy avocado, fresh panela cheese, crunchy chicharrón, and a swirl of sour cream. Comfort with every spoonful.'
  es: 'Un clásico mexicano que reconforta el alma — caldo sedoso de jitomate y chile hecho en la Thermomix®, coronado con tiras crujientes de tortilla fritas aparte, aguacate cremoso, queso panela fresco, chicharrón crocante y un toque de crema. Sabor reconfortante en cada cucharada.'

tips_and_tricks:
  en: 'Fry the tortilla strips just before serving — they lose their crunch quickly in the broth. For deeper flavor, lightly char the tomatoes on a comal before blending. Set up the toppings in small bowls so everyone can build their own bowl at the table.'
  es: 'Fríe las tiras de tortilla justo antes de servir — pierden lo crujiente rápido en el caldo. Para un sabor más profundo, asa ligeramente los jitomates en un comal antes de licuarlos. Coloca los acompañamientos en tazones pequeños para que cada quien arme su sopa en la mesa.'

scaling_notes:
  en: "Yields 6 servings. Halves cleanly. Doubling exceeds the Thermomix® bowl's capacity for the simmer step — for more, run two batches. The broth keeps 4 days in the fridge and freezes well for up to 2 months without the toppings; fry tortillas and slice avocado fresh when serving."
  es: 'Rinde 6 porciones. Se reduce a la mitad sin problema. Duplicar excede la capacidad del vaso de la Thermomix® en el paso de cocción — para más, prepáralo en dos tandas. El caldo se conserva 4 días en el refrigerador y se congela bien hasta 2 meses sin los acompañamientos; fríe las tortillas y rebana el aguacate al momento de servir.'

# DB has only dish_type:[soup]. Adding cuisine, meal_type, dish_type:+main_dish,
# occasion, practical. Deliberately NOT adding diet:vegetarian (chicharrón = pork)
# nor practical:one_pot (uses Thermomix + separate frying pan).
tags:
  cuisine: [ mexican ]
  meal_type: [ lunch, dinner ]
  dish_type: [ soup, main_dish ]
  occasion: [ comfort_food, sunday_family, weeknight ]
  practical: [ leftover_friendly, batch_cook, make_ahead ]

# DB tools: Thermomix®, Frying pan, Slotted spoon, Thermomix® spatula.
# Adding Kitchen scale (220 g/30 g oil split, 750 g tomato, 600 g water — precise weights)
# and Paper towels (step 1 drains tortilla strips on absorbent paper).
kitchen_tools:
  set:
    - name_en: 'Thermomix®'
    - name_en: 'Thermomix® spatula'
    - name_en: 'Frying pan'
    - name_en: 'Slotted spoon'
    - name_en: 'Kitchen scale'
    - name_en: 'Paper towels'

step_text_overrides:
  # Step 1: ES usted voice (Coloque/fría/reserve) → tú (Coloca/fríe/reserva).
  # No structured Thermomix fields (manual stovetop fry); leave the literal weight.
  - match: { order: 1 }
    translations:
      en:
        instruction: 'Heat 220 g of oil in a frying pan over medium heat, fry the pasilla chilies until lightly golden, then fry the tortilla strips. Drain on paper towels and set aside.'
      es:
        instruction: 'Calienta 220 g de aceite en un sartén a fuego medio, fríe los chiles pasilla hasta que estén ligeramente dorados y luego las tiras de tortilla. Escurre sobre papel absorbente y reserva.'
  # Step 2: structured fields represent the sauté only (10 min / 120°C / speed 1);
  # the chop (5 sec / speed 5) stays hard-coded in the text since the structured
  # record can't carry both ops. Replace only the sauté params with %thermomix%.
  # ES usted (Coloque/pique/sofría) → tú (Coloca/pica/sofríe).
  - match: { order: 2 }
    translations:
      en:
        instruction: 'Place the garlic, onion, tomato, 30 g of oil, and salt in the mixing bowl, chop for 5 seconds at speed 5, then sauté %thermomix%.'
      es:
        instruction: 'Coloca en el vaso los dientes de ajo, la cebolla, el jitomate, 30 g de aceite y la sal, pica 5 seg. / vel. 5 y sofríe %thermomix%.'
  # Step 3: structured fields don't support a speed ramp (no speed_start/end on
  # step_overrides), so the "speed 5-10" stays hard-coded in text. Just fix ES
  # usted (Añada/licue) → tú (Añade/licúa).
  - match: { order: 3 }
    translations:
      en:
        instruction: 'Add the water and blend for 1 minute, gradually increasing the speed from 5 to 10.'
      es:
        instruction: 'Añade el agua y licúa 1 min., aumentando progresivamente la velocidad de 5 a 10.'
  # Step 4: %thermomix% swap. ES usted (Añada/cocine/Sirva) → tú (Añade/cocina/Sirve).
  # Cilantro/coriander naming: EN canonical = "cilantro" (Mexico-first, matches
  # ingredient name).
  - match: { order: 4 }
    translations:
      en:
        instruction: 'Add the green chili and cilantro and cook %thermomix%. Serve the soup with the fried tortilla strips, pasilla chili, panela cheese, sour cream, pork crackling, and avocado.'
      es:
        instruction: 'Añade el chile verde y el cilantro y cocina %thermomix%. Sirve la sopa con las tiras de tortilla fritas, el chile pasilla, el queso panela, la crema, el chicharrón y el aguacate.'
