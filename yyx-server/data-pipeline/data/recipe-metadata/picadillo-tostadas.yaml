step_overrides:
  # Steps 4 and 5 had identical sauté params (480s/120°C/spoon) — interpreting
  # step 4 as the chop and step 5 as the sole sauté. Clearing step 4's
  # structured Thermomix fields so the cooking guide doesn't show
  # contradictory params; chop params (5s/speed 5) stay hard-coded in step 4
  # text since they're not in the structured fields and authoring intent on
  # the chop's structured representation is uncertain.
  - match: { order: 4 }
    thermomix_time: null
    thermomix_speed: null
    thermomix_temperature: null
    thermomix_temperature_unit: null

step_text_overrides:
  - match: { order: 1 }
    translations:
      en:
        instruction: 'Place the cheese in the bowl, grate %thermomix%, remove from the bowl and set aside until serving time.'
      es:
        instruction: 'Coloca el queso en el vaso, ralla %thermomix%, saca del vaso y reserva hasta la hora de servir.'
  - match: { order: 2 }
    translations:
      en:
        instruction: 'Place the potatoes and carrots in the bowl, chop %thermomix%. Remove from the bowl and set aside in the Varoma dish along with the raisins.'
      es:
        instruction: 'Coloca las papas y las zanahorias en el vaso, pica %thermomix%, saca del vaso y reserva en el recipiente Varoma junto con las pasitas.'
  - match: { order: 3 }
    translations:
      en:
        instruction: 'Place the tomato in the bowl and blend %thermomix%. Remove from the bowl and set aside. Rinse the bowl.'
      es:
        instruction: 'Coloca en el vaso el jitomate, licúa %thermomix%, saca del vaso y reserva. Enjuaga el vaso.'
  # Step 4: chop only (the sauté is now wholly in step 5 — see step_overrides).
  - match: { order: 4 }
    translations:
      en:
        instruction: 'Place the oil, onion, and garlic in the bowl and chop for 5 seconds at speed 5.'
      es:
        instruction: 'Coloca en el vaso el aceite, la cebolla y el ajo y pica 5 seg. / vel. 5.'
  # Step 5: relocated "without the measuring cup" instruction from step 4
  # (it applies to the sauté, not the chop).
  - match: { order: 5 }
    translations:
      en:
        instruction: 'Sauté %thermomix% without placing the measuring cup on top.'
      es:
        instruction: 'Sofríe %thermomix% sin colocar el cubilete.'
  - match: { order: 6 }
    translations:
      en:
        instruction: 'Add the ground beef, salt, reserved tomato, thyme, and pepper. Place the Varoma in position and cook %thermomix%. Carefully remove the Varoma, transfer the contents of the bowl to a mixing bowl, add the cooked vegetables from the Varoma, and mix very well with a spatula.'
      es:
        instruction: 'Añade la carne molida, la sal, el jitomate reservado, el tomillo y la pimienta, coloca el Varoma en su posición y cocina %thermomix%. Retira cuidadosamente el Varoma, transfiere el contenido del vaso a un tazón, añade las verduras cocidas del Varoma y mezcla muy bien con la espátula.'
  - match: { order: 7 }
    translations:
      es:
        instruction: 'Sirve caliente o frío con tostadas de maíz, lechuga, crema y el queso rallado.'
