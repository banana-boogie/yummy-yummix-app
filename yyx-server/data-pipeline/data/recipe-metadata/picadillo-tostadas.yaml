scaling_notes:
  en: 'Yields 6 servings (3 tostadas each). Halves cleanly. Doubling exceeds the Thermomix® bowl''s capacity for the 1 kg ground-beef batch — for more, run two batches and combine in a stovetop pan to keep warm. Picadillo keeps 4 days in the fridge and freezes well for up to 3 months; store tostadas separately in an airtight container.'
  es: 'Rinde 6 porciones (3 tostadas cada una). Se reduce a la mitad sin problema. Duplicar excede la capacidad del vaso de la Thermomix® para el lote de 1 kg de carne molida — para más, prepara dos tandas y combínalas en una sartén para mantener caliente. El picadillo se conserva 4 días en el refrigerador y se congela bien hasta 3 meses; guarda las tostadas por separado en un recipiente hermético.'

