description:
  en: 'Spiced ground beef with potatoes and tomato over crisp tostadas. The Thermomix browns the beef and finishes the picadillo; tostadas are store-bought and crisped in the oven.'
  es: 'Carne molida especiada con papas y jitomate sobre tostadas crujientes. La Thermomix dora la carne y termina el picadillo; las tostadas se compran y se doran en el horno.'

tips_and_tricks:
  en: 'Look for 80/20 ground beef — leaner cuts dry out. Drain the rendered fat at step 4 unless you want a heavier finish.'
  es: 'Busca carne molida 80/20 — los cortes magros se secan. Drena la grasa al paso 4 a menos que quieras un acabado más pesado.'

scaling_notes:
  en: 'The Thermomix bowl fits one batch of picadillo for 6. For 12 portions, run two batches and combine in a stovetop pan to keep warm.'
  es: 'En la Thermomix cabe un lote de picadillo para 6. Para 12 porciones, haz dos tandas y combínalas en una sartén para mantener caliente.'

