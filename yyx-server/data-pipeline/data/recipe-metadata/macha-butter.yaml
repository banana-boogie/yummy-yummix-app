# DB has portions=10 (~70 g/serving) which is generous for a spicy compound
# butter used as a condiment. ~700 g total yield ÷ ~30 g/serving (typical
# 1-2 Tbsp dollop on bread, pasta, eggs, tacos) ≈ 23 portions.
# Also fixing total_time: prep is ~15 min (destem 18 chiles, peel 8 garlic,
# weigh ingredients) + ~11 min Thermomix cook = ~26 min total. DB had
# total_time=10 which is shorter than the cook alone.
timings:
  prep_time: 15
  total_time: 26
  portions: 23

description:
  en: 'A Mexican-style salsa macha compound butter — three chiles (árbol, morita, guajillo) and garlic toasted in olive oil with mixed nuts, blended into unsalted butter in the Thermomix®. Spicy, smoky, deeply savory. Spread it on warm bread, fold it into pasta, melt it over grilled steak or roasted vegetables, or stir a spoonful into rice and eggs.'
  es: 'Una mantequilla compuesta al estilo de la salsa macha mexicana — tres chiles (árbol, morita y guajillo) y ajo tostados en aceite de oliva con surtido de nueces, licuados con mantequilla sin sal en la Thermomix®. Picosa, ahumada y muy sabrosa. Úntala en pan caliente, intégrala a la pasta, derrítela sobre un bistec a la plancha o verduras asadas, o revuelve una cucharada en arroz o huevos.'

tips_and_tricks:
  en: 'Heat scales with chile load — start with half the árbol chiles (and seed them) for a milder version, then taste and add more. Toast the chiles, garlic, and nuts only until fragrant and lightly golden; pushing them to dark brown turns the butter bitter. Use shelled mixed nuts (peanut, almond, pecan, cashew all work) for a lighter color and cleaner flavor. The butter firms up cold — pull it out 10-15 minutes before serving so it spreads easily.'
  es: 'Lo picante depende de cuántos chiles uses — empieza con la mitad de los chiles de árbol (y sin semillas) para una versión más suave, prueba y ajusta. Tuesta los chiles, el ajo y las nueces sólo hasta que estén aromáticos y dorados; si se queman, la mantequilla queda amarga. Usa un surtido de nueces sin cáscara (cacahuate, almendra, nuez pecana, marañón) para un color más claro y un sabor más limpio. La mantequilla se endurece al frío — sácala del refrigerador 10-15 minutos antes de servir para que unte fácil.'

scaling_notes:
  en: 'Yields ~700 g (about 23 servings of 30 g). Halves cleanly. Doubling exceeds the Thermomix® bowl''s comfortable capacity for the toast step — for more, run two batches. Stores 2-3 weeks in an airtight container in the fridge; freezes well for up to 3 months.'
  es: 'Rinde ~700 g (alrededor de 23 porciones de 30 g). Se reduce a la mitad sin problema. Duplicar excede la capacidad cómoda del vaso de la Thermomix® para el paso de tostado — para más, prepárala en dos tandas. Se conserva 2-3 semanas en un recipiente hermético en el refrigerador; se congela bien hasta 3 meses.'

