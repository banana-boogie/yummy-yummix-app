description:
  en: 'Classic Mexican red rice (arroz rojo) cooked entirely in the Thermomix® — long-grain rice simmers in a tomato, onion, and garlic broth while frozen carrots and peas steam in the simmering basket above. A sprig of cilantro perfumes the pot. A weeknight side that pairs with everything from grilled chicken to picadillo to tacos.'
  es: 'Arroz rojo mexicano hecho por completo en la Thermomix® — el arroz se cocina en un caldillo de jitomate, cebolla y ajo mientras la zanahoria y los chícharos congelados se cuecen al vapor en el cestillo. Una rama de cilantro perfuma el vaso. Una guarnición de diario que combina con todo, desde pollo asado hasta picadillo o tacos.'

tips_and_tricks:
  en: 'Rinse the rice well in step 1 — clearer water = fluffier grains. Use ripe, deeply red tomatoes for the broth; pale tomatoes give pale rice. Pull the cilantro sprig out before serving, or chop and stir it back in for a fresher flavor. Taste before serving and adjust salt — bouillon brands vary in saltiness. Reheat with a splash of water in a covered pan over low heat to keep the grains tender.'
  es: 'Enjuaga bien el arroz en el primer paso — entre más clara salga el agua, más esponjado queda. Usa jitomates rojos y maduros para el caldillo; los jitomates pálidos dan un arroz pálido. Saca la rama de cilantro antes de servir, o pícala y revuélvela para un sabor más fresco. Prueba antes de servir y ajusta la sal — los cubos de consomé varían en sazón. Recalienta con un chorrito de agua en una sartén tapada a fuego bajo para que los granos no se sequen.'

scaling_notes:
  en: 'Yields 6 servings. Halves cleanly. Doubling exceeds the Thermomix® bowl''s capacity for the simmer step — for more, run two batches. Keeps 4-5 days in the fridge; freeze leftovers for up to 2 months.'
  es: 'Rinde 6 porciones. Se reduce a la mitad sin problema. Duplicar excede la capacidad del vaso de la Thermomix® en el paso de cocción — para más, prepáralo en dos tandas. Se conserva 4-5 días en el refrigerador; congela las sobras hasta por 2 meses.'

