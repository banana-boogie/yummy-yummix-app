step_text_overrides:
  # Step 1 es typo: "enjuagua" → "enjuaga" (es-ES is already correct).
  - match: { order: 1 }
    translations:
      es:
        instruction: 'Pesa el arroz en el cestillo, enjuaga bien y reserva.'
  # Step 2 en wrongly says "tomato stock" — the ingredient is "Chicken bouillon"
  # (consomé de pollo) and the es text says "los cubos de caldo".
  - match: { order: 2 }
    translations:
      en:
        instruction: 'Place the onion, tomato, garlic clove, chicken bouillon cubes, and oil in the mixing bowl, and blend %thermomix%.'
  # Step 4 es has hard-coded "cocina|**28 min. / 100 °C / vel. 4**" instead of
  # the %thermomix% placeholder. Replacing so the cooking guide renders the
  # parameters from the structured fields (1680 s / 100 °C / speed 4) instead
  # of duplicating them in the text.
  - match: { order: 4 }
    translations:
      es:
        instruction: 'Añade el agua, coloca el cestillo dentro del vaso, añade al cestillo la mezcla de verduras congeladas y la rama de cilantro, cocina %thermomix%.'

