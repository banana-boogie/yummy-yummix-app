requires_authoring:
  reasons: [missing_step_translation]
  notes: |
    Primary issue (blocks publish):

      Step 1 (id 1471ddd6-…, order 1) has an empty Spanish instruction.
      The recipe-metadata pipeline does not edit recipe_step_translations
      text — needs human authoring in the admin UI.

      Suggested ES: "Añade todos los ingredientes al vaso del Thermomix
      y mezcla a velocidad 3 durante 10 segundos."

    Other concerns (not auto-fixed in this YAML):

      1. Orphan thermomix_temperature_unit on step 1.
         The unit is set to 'C' but the temperature value is NULL.
         Cosmetic; harmless at runtime because the unit is only consulted
         when a temperature value is present. Admin can clear it during
         the next edit pass.

      2. es-ES translation rows exist on recipe and step 2/3.
         They have minor synonym variations vs the es base — e.g.
         "marinados" vs "marinadas", "frasco" vs "tarro". They are NOT
         exact mirrors of es, so the deterministic-mirror rule does not
         auto-strip them, but they look like auto-translation artifacts
         rather than a deliberate Spain-Spanish override. Mexico-first
         launch: admin should decide whether to keep or delete.

      3. Speed 3 for 10s may not fully emulsify.
         Some Thermomix dressing recipes use speed 5 for emulsifying.
         The structured fields match the step's prose, so this YAML does
         not override them. Flagging for admin verification of actual
         texture in production.

      4. Diet tags omitted intentionally.
         vegetarian status depends on whether the "avocado mayo"
         ingredient (slug avocado_mayo) contains egg, which the recipe
         data does not record. honey makes vegan a no. gluten_free is
         likely true (no wheat ingredients) but worth confirming for
         cross-contamination on the Dijon mustard brand. Admin should
         add gluten_free / vegetarian once verified.
