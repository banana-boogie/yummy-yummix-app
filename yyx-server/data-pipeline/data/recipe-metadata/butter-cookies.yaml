# Re-decided from scratch. Classic flour-sugar-butter-egg-baking_powder
# cookie. Yields 30 pieces — a clear dessert (no protein/carb/veg meal
# framing). Cookies keep well at room temperature and the recipe is a
# natural batch (30 / ~4 per person ≈ 7-8 servings). cooking_level
# beginner — Thermomix does the mixing in one pulse. Setting
# leftovers_friendly + batch_friendly true (DB has both null today);
# omitting max_household_size_supported because cookies aren't a per-
# household meal.
planner:
  role: dessert
  alternate_planner_roles: []
  meal_components: []
  is_complete_meal: false
  equipment_tags: [oven, thermomix]
  cooking_level: beginner
  leftovers_friendly: true
  batch_friendly: true

# description is null in the live DB across all locales — adding a punchy
# one-line entry so the recipe reads as a finished dish on browse cards.
description:
  en: 'Classic European-style butter cookies — buttery, lightly sweet, and gently crisp. The dough comes together in the Thermomix® in 20 seconds, ready to bake in under an hour.'
  es: 'Galletas de mantequilla clásicas al estilo europeo — mantecosas, ligeramente dulces y delicadamente crujientes. La masa se prepara en la Thermomix® en 20 segundos, lista para hornear en menos de una hora.'

# Two changes vs live tips:
#   1. ES typo "azúcar de vainila" → "azúcar de vainilla" (the es-ES row
#      already had the correct spelling; es had the typo).
#   2. ES voice "añada" (usted) → "añade" (tú) — the rest of the recipe
#      (steps, ingredient notes) uses tú voice, so the tip drifts.
# EN copy is unchanged.
tips_and_tricks:
  en: 'In step 2, add other flavors such as vanilla sugar, lemon zest, orange zest, ground cinnamon, or chopped candied fruit.'
  es: 'En el paso 2, añade otros sabores como azúcar de vainilla, ralladura de limón, ralladura de naranja, canela molida o fruta confitada picada.'

# scaling_notes is null in DB. Adding short guidance for the obvious
# questions cookie bakers ask: how long do they keep, can I freeze.
scaling_notes:
  en: 'Yields 30 cookies. Halves and doubles cleanly. Baked cookies keep 1 week in an airtight container at room temperature; cookie dough freezes well as a log for sliced cookies on demand.'
  es: 'Rinde 30 galletas. Se duplica y se reduce a la mitad sin problema. Las galletas horneadas se conservan 1 semana en un recipiente hermético a temperatura ambiente; la masa cruda se congela bien en forma de rollo para galletas en rebanadas cuando las necesites.'

# Currently dish_type[bakery] + meal_type[dessert] (already correct;
# omitted to leave untouched). Adding diet, occasion, practical so the
# recipe is reachable from those filters.
#
# Diet-tag audit: vegetarian holds (flour, sugar, butter, egg, baking
# powder — no animal flesh). Not adding vegan (butter + egg) or
# gluten_free (wheat flour). Not adding low_sugar (100g sugar / 30
# cookies = ~3.3g per cookie, but the recipe text actively *adds* more
# dipping sugar in step 3, so a low_sugar promise would mislead).
tags:
  diet: [vegetarian]
  occasion: [comfort_food, kid_friendly]
  practical: [five_ingredients, batch_cook, make_ahead, beginner_friendly, leftover_friendly]

# kitchen_tools currently has only Oven. Step text references the
# Thermomix® (step 2), parchment-lined baking sheet (steps 1 + 3), and a
# cooling rack (step 4). Setting all five so the tool-prep checklist is
# accurate. Canonical names verified in taxonomy.kitchen_tool_names_en —
# DB stores 'Thermomix®' WITH ® (the live row was updated since the
# earlier review session).
kitchen_tools:
  set:
    - name_en: 'Oven'
    - name_en: 'Thermomix®'
    - name_en: 'Baking sheet'
    - name_en: 'Baking paper'
    - name_en: 'Cooling rack'

# Minor authoring items the YAML schema cannot fix cleanly enough to be
# worth a row write — surfaced for human awareness, not as a blocker:
#
#   * Step 3 instructs "Place some sugar on a plate ... dip the dough
#     ball into the sugar" but the ingredient list only lists 100 g of
#     sugar (consumed in step 2's dough). Readers will guess they need
#     extra sugar for dipping, but a strict ingredient-list reader would
#     come up short. Consider bumping Sugar to e.g. 130 g with a notes
#     line, or adding a note to step 3.
#   * recipe_ingredients translations use recipe_section="main"
#     (lowercase) on the EN locale; the rest of the recipe corpus uses
