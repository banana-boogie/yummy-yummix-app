step_text_overrides:
  - match: { order: 2 }
    translations:
      en:
        instruction: "Place the butter, granulated sugar, and brown sugar in the mixing bowl. Cream %thermomix%."
      es:
        instruction: "Coloca la mantequilla, el azúcar granulada y el azúcar morena en el vaso. Acrema %thermomix%."
  - match: { order: 3 }
    translations:
      en:
        instruction: "Add the eggs, vanilla, and lemon juice. Mix %thermomix%."
      es:
        instruction: "Añade los huevos, la vainilla y el jugo de lima. Mezcla %thermomix%."
  - match: { order: 4 }
    translations:
      en:
        instruction: "Add the flour, oats, baking soda, salt, and cinnamon. Mix %thermomix%. Do not overmix."
      es:
        instruction: "Agrega la harina, la avena, el bicarbonato, la sal y la canela. Mezcla %thermomix%. No sobre mezcles."

tips_and_tricks:
  en: "You can chop the walnuts in your Thermomix® by setting **5 sec/speed 5**. You can shape the dough into balls and freeze them to bake later. When you're ready to bake, there’s no need to thaw them, simply preheat the oven to 150°C and place the frozen dough balls directly on a parchment-lined baking sheet, leaving about 2 inches of space between each one. Bake until the edges are golden brown and the center is still soft."
  es: "Puedes picar las nueces en tu Thermomix® programando **5 seg/vel 5**. Puedes formar bolitas con la masa y congelarlas para hornearlas después. Cuando quieras hornearlas, no es necesario descongelarlas, simplemente precalienta el horno a 150°C y colócalas directamente sobre una bandeja forrada con papel para hornear, dejando 5 cm de separación entre cada una. Hornea hasta que los bordes estén dorados y el centro aún suave."
