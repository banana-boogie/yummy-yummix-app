description:
  en: "Soft, chewy chocolate chip cookies loaded with rolled oats and toasted walnuts. The Thermomix® creams the butter and sugars, mixes the dough, and folds in the chips and nuts on reverse blade — 24 cookies with almost no hands-on time. Bake right away or freeze the dough balls for warm cookies on demand."
  es: "Galletas suaves y masticables con chispas de chocolate, avena en hojuelas y nueces de castilla. La Thermomix® acrema la mantequilla con los azúcares, mezcla la masa e incorpora el chocolate y las nueces con cuchillas inversas — 24 galletas con casi nada de tiempo activo. Hornéalas al momento o congela las bolitas de masa para tener galletas calientes cuando se te antojen."

