recipe_match:
  id: 'd1cad0e8-3295-4da1-ba4a-e2a789c6b9ee'
  name_en: 'Zucchini Soup'
  expected_recipe_updated_at: '2026-04-15T17:07:28.964026+00:00'

review:
  reviewed_by_label: 'claude-opus-4-7'
  reviewed_at: '2026-04-28T18:55:36.000Z'

planner:
  leftovers_friendly: true
  batch_friendly: true

# Sum of structured Thermomix step durations is ~28 min. Adding ~10 min of
# real prep (washing zucchini, peeling garlic, handling spinach) + ~7 min of
# pour/scrape/serve buffer puts a realistic total at ~45 min. The DB's
# previous 20/90 split was unsupported by the step times.
timings:
  prep_time: 10
  total_time: 45

description:
  en: 'A creamy zucchini and spinach soup made entirely in the Thermomix. Light, vegetable-forward, and easy to prep.'
  es: 'Una sopa cremosa de calabacita y espinaca preparada totalmente en la Thermomix. Ligera, llena de vegetales y fácil de preparar.'

# Per-category set replacement. Categories not listed here (`dish_type` already
# = ['soup'], unchanged) are preserved as-is.
tags:
  cuisine: [mexican]
  meal_type: [lunch, dinner]
  diet: [gluten_free, healthy, vegetarian, vegan]
  primary_ingredient: [vegetables]
  # `make_ahead` dropped — soup doesn't require advance prep, just reheats
  # well. `leftover_friendly` already covers that. `quick` added now that
  # timings reflect ~45 min total.
  practical: [quick, leftover_friendly, thermomix_basics, one_pot]

# Recipe currently has zero rows in recipe_kitchen_tools despite
# equipment_tags=['thermomix']. Adding Thermomix as the kitchen tool.
kitchen_tools:
  set:
    - name_en: 'Thermomix'

# es-ES recipe_translations row is an exact mirror of es (verbatim
# tips_and_tricks). Strip it; auto-translation artifact, not a deliberate
# Spain-Spanish override.
cleanup:
  delete_locales: ['es-ES']

# requires_authoring intentionally omitted — every concern from the initial
# review pass is now resolved in this YAML or by the pipeline itself. Notes:
#   - cleanup.delete_locales above will strip es-ES rows from
#     recipe_translations, recipe_step_translations, and
#     recipe_ingredient_translations (the RPC handles all three layers).
#   - timings updated to reflect actual step durations.
#   - vegan added now that the cheese is confirmed optional.
#   - make_ahead removed (leftover_friendly captures the reheat behavior).
