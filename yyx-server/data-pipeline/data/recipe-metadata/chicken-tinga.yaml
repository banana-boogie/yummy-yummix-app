description:
  en: 'Shredded chicken simmered in a smoky tomato-chipotle sauce, made in the Thermomix® and served on crisp tostadas with sour cream and panela cheese.'
  es: 'Pollo deshebrado en una salsa ahumada de jitomate y chipotle, preparado en la Thermomix® y servido sobre tostadas crujientes con crema y queso panela.'

tips_and_tricks:
  en: 'Adjust the chipotle to taste for a milder or smokier tinga. The filling keeps well, so you can cook it ahead and assemble the tostadas just before serving.'
  es: 'Ajusta el chipotle al gusto para una tinga más suave o más ahumada. El relleno se conserva bien, así que puedes cocinarlo con anticipación y montar las tostadas justo antes de servir.'

scaling_notes:
  en: 'The 1 kg chicken batch serves 6 generously. For smaller households, refrigerate leftovers up to 3 days or freeze the tinga filling without the tostadas, cream, or cheese.'
  es: 'La tanda con 1 kg de pollo rinde 6 porciones generosas. Para hogares más pequeños, refrigera las sobras hasta 3 días o congela el relleno de tinga sin las tostadas, la crema ni el queso.'

