description:
  en: 'Plump shrimp sizzled with garlic, paprika, and olive oil — Spanish gambas al ajillo done in the Thermomix. On the table in 20 minutes.'
  es: 'Camarones jugosos con ajo, pimentón y aceite de oliva — gambas al ajillo a la Thermomix. En la mesa en 20 minutos.'

tips_and_tricks:
  en: 'Use peeled, deveined shrimp 21/25 count for the right texture. Do not over-cook past step 4 — they go rubbery fast. Serve immediately with crusty bread for the oil.'
  es: 'Usa camarones limpios y sin cáscara talla 21/25. No los cocines más allá del paso 4 — se ponen chiclosos rápido. Sirve de inmediato con pan crujiente para untar el aceite.'

scaling_notes:
  en: 'Doubles to 8 portions. Use two Thermomix batches to avoid overcrowding — shrimp will steam instead of sizzle if packed too tight.'
  es: 'Se duplica a 8 porciones. Usa dos tandas en la Thermomix para no saturar — los camarones se cuecen en vapor si los aprietas mucho.'

