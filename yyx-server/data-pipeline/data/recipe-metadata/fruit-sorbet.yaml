description:
  en: 'Five-minute fruit sorbet made entirely in the Thermomix® — pulverized sugar, fresh fruit, and crushed ice blitzed into a bright, naturally gluten-free frozen dessert.'
  es: 'Nieve de fruta lista en cinco minutos, hecha completamente en la Thermomix® — azúcar pulverizada, fruta fresca y hielo triturado se convierten en un postre congelado brillante y naturalmente sin gluten.'

scaling_notes:
  en: 'Recipe yields 8 servings and uses the full ice load (1 kg) — do not scale up further in a single Thermomix® bowl. For more servings, run the recipe in successive batches and serve immediately; refrozen sorbet turns icy.'
  es: 'La receta rinde 8 porciones y usa la carga completa de hielo (1 kg) — no la dupliques en un solo vaso de Thermomix®. Para más porciones, repite la receta en tandas y sirve de inmediato; al recongelarse, la nieve se vuelve quebradiza.'

tags:
