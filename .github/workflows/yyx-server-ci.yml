# YummyYummix Server CI Pipeline
#
# Runs on:
# - Push to main/develop branches (when yyx-server files change)
# - Pull requests to main/develop (when yyx-server files change)
#
# Jobs:
# 1. auto-format: Deno format fixer for PR branches
# 2. unit-tests: Deno unit tests with coverage
#
# Shared-cloud smoke tests are intentionally manual for now. We only have one
# cloud Supabase environment, so end-to-end planner smoke tests should not run
# automatically in PR CI until we introduce a separate staging/production split
# or a stronger isolated test strategy.
#
# FOR AI AGENTS:
# - This workflow tests the Supabase Edge Functions (yyx-server)
# - Unit tests run Deno.test files
# - Shared-cloud smoke tests live in `supabase/functions/__tests__/` but are
#   manual-only until the project has an isolated environment strategy

name: YYX Server CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'yyx-server/**'
      - '.github/workflows/yyx-server-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'yyx-server/**'
      - '.github/workflows/yyx-server-ci.yml'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # AUTO-FORMAT
  # Runs deno fmt and pushes a fix commit if anything changed.
  # This replaces a blocking format gate so formatting never
  # stalls a PR — the pre-commit hook catches most issues locally
  # and CI acts as the safety net.
  # ============================================================
  auto-format:
    name: Auto Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run deno fmt
        working-directory: yyx-server
        run: deno task fmt

      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No formatting changes needed."
          else
            git commit -m "style(server): auto-format deno files"
            git push
          fi

  # ============================================================
  # UNIT TESTS
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('yyx-server/**/deno.json', 'yyx-server/**/deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Run unit tests with coverage
        working-directory: yyx-server
        run: deno task test:coverage

      - name: Display coverage summary
        working-directory: yyx-server
        run: deno task coverage:report || true
